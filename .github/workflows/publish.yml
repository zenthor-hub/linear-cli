name: Publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  build:
    name: Verify and package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.22.2
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify

      - name: Validate tag version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag version ($TAG) does not match package.json version ($VERSION)."
            exit 1
          fi

      - name: Build package artifact
        run: |
          mkdir -p package
          npm pack --pack-destination package

      - name: Upload package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-package
          path: package/*.tgz
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.22.2
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install pinned npm for OIDC trusted publishing
        run: npm install -g npm@11.6.2

      - name: Download verified package artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: npm-package
          path: package

      - name: Publish
        run: npm publish package/*.tgz --access public --provenance
